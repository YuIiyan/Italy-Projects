<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No WiFi Dinosaur Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ambient ambient-one"></div>
    <div class="ambient ambient-two"></div>

    <main class="page">
        <header class="hero">
            <p class="eyebrow">Arcade Sprint</p>
            <h1>No WiFi Dino Run</h1>
            <p class="tagline">Jump over rocks, survive longer, and beat your own score.</p>
        </header>

        <section class="game-shell" aria-label="Dinosaur running game">
            <div class="hud">
                <p class="score-label">Score</p>
                <h2 id="score">0</h2>
            </div>
            <div id="game">
                <div id="start-overlay">
                    <button id="start-button" type="button">Start Run</button>
                </div>
                <div id="dino"></div>
                <div id="rock"></div>
                <div id="bird"></div>
            </div>
        </section>

        <p class="controls">Press Space or Arrow Up to jump rocks. Hold Arrow Down or S to crouch under birds.</p>
    </main>

    <div class="scanline" aria-hidden="true"></div>

    <script src="script.js"></script>
</body>
</html>
